<!DOCTYPE html>
<html lang="da">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Login</title>

</head>

<body>

<div class="app login-page">

    <header class="app-header">

        <img 
        src="billeder/logo.webp"
        alt="Logo"
        class="app-logo">

    </header>

    <section class="login-content">


        <h1>Login</h1>

        <p class="login-subtitle">
            Velkommen til appen
        </p>

        <form class="login-form">

            <label class="login-label">

                Email

            </label>

            <input 
            type="email"
            class="login-input"
            placeholder="Skriv din email">

            <label class="login-label">

                Password

            </label>

            <div class="password-wrapper">

                <input 
                type="password"
                class="login-input"
                placeholder="Skriv din adgangskode">

            </div>

            <div class="login-row">

                <label class="checkbox">

                    <input type="checkbox">

                    <span>Husk mig</span>

                </label>


                <a href="#" class="link">

                    Glemt password

                </a>

            </div>

            <a href="forside.html" class="loginBtn">
              Log In
            </a>

        </form>

    </section>

</div>

</body>
</html>
