<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designsystem</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Farver -->
  <section class="section">
    <h2 class="text-subheading">Farver</h2>

    <div class="color-list">
      <p class="text-body">Primær: <span class="color-primary">#e30613</span></p>
      <p class="text-body">Sekundær: <span class="color-secondary">#ffd6d7</span></p>
      <p class="text-body">Accent: <span class="color-accent">#e8f1f8</span></p>
      <p class="text-body">Tekst: <span class="color-text">#1d1d1b</span></p>
      <p class="text-body">Border: <span class="color-border">#dadada</span></p>
      <p class="text-body">Baggrund: <span class="color-background">#ffffff</span></p>
    </div>
  </section>

  <!-- Typografi -->
  <section class="section">
    <h2 class="text-subheading">Typografi</h2>

    <p class="text-heading">Overskrift (24px, bold)</p>
    <p class="text-subheading">Underrubrik (16px, semi-bold)</p>
    <p class="text-body">Brødtekst (14px, regular)</p>
    <p class="text-muted">Muted tekst (12px)</p>
    <p class="text-link">Link (14px, bold)</p>
  </section>

  <!-- Komponenter -->
  <section class="section">
    <h2 class="text-subheading">Komponenter</h2>

    <label class="text-muted">Email</label>
    <input class="input" placeholder="Input felt">

    <div class="row">
      <label class="checkbox">
        <input type="checkbox">
        Husk mig
      </label>

      <a href="#" class="link">Glemt password?</a>
    </div>

    <button class="btn">CTA knap</button>
  </section>

</div>

</body>
</html>
