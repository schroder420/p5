<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Chat</title>
</head>
<body>

<div class="app page--chat">


    <!-- Chat header -->

    <header class="app-header">
        <img src="billeder/logo.webp"
        alt="Logo"
        class="app-logo">
    </header>


    <!-- Beskeder -->

    <div id="chatMessages" class="chat-messages">


        <!-- FAQ accordion (indhold tilføjes via JS) -->



    </div>


    <!-- Input -->

    <div class="chat-input-row">

        <input id="chatInput"
        class="chat-input"
        type="text"
        placeholder="Aa">

        <button id="chatSendBtn" type="button" class="chat-send-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

    </div>

    <!-- Navbar -->

    <nav class="navbar">

        <a href="vidensbase.html" class="navbar-item">
            <img src="ikoner/vidensbasen_tyk.svg" alt="Vidensbasen" class="navbar-icon">
        </a>

        <a href="profil.html" class="navbar-item">
            <img src="ikoner/profil_tyk.svg" alt="Profil" class="navbar-icon">
        </a>

        <a href="chat.html" class="navbar-item navbar-icon--active">
            <img src="ikoner/chat_tyk.svg" alt="Chat" class="navbar-icon">
        </a>

    </nav>

</div>


</body>
</html>
