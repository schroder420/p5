<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>

<div class="app">

    <!-- Logo -->

    <header class="app-header">
        <img src="billeder/logo.webp"
        alt="Logo"
        class="app-logo">
    </header>


    <!-- Hero slider -->

    <div class="hero-swiper">

        <div class="hero-slide active"
        style="background-image:url('billeder/benedikte-i-koekken.webp')">

            <div class="hero-content">

                <h3>Køberrådgivning 2026</h3>

                <h4>
                    Køberrådgivning kan redde dit boligkøb.
								</h4>

            </div>

        </div>


        <div class="hero-slide"
        style="background-image:url('billeder/boligmarkedet.webp')">

            <div class="hero-content">

                <h3>Boligmarkedet 2025</h3>

                <h4>
                    Hvad sker der på boligmarkedet?
								</h4>

            </div>

        </div>


        <div class="hero-slide"
        style="background-image:url('billeder/kolonihavehuse.webp')">

            <div class="hero-content">

                <h3>Kolonihavehuse</h3>

                <h4>
                    Alt du skal vide om køb af kolonihavehus.
								</h4>

            </div>

        </div>

    </div>

    <div class="slider-dots">

        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>

    </div>


    <!-- Anmeldelser -->

    <section class="reviews">

        <h1>Anmeldelser</h1>

        <div class="review-grid">

            <article class="review-card">

                <img src="billeder/oestergaardsvej.jpg">

								<div class="stars">

        					<img src="ikoner/gul-stjerne.svg">
        					<img src="ikoner/gul-stjerne.svg">
        					<img src="ikoner/gul-stjerne.svg">
        					<img src="ikoner/gul-stjerne.svg">
        					<img src="ikoner/gul-stjerne.svg">

    						</div>

                <h2>Louise</h2>

                <p>
                    Super god rådgivning
                    og virkelig nem proces.
                </p>

            </article>


            <article class="review-card">

                <img src="billeder/groenningen.jpg">

								<div class="stars">

        					<img src="ikoner/gul-stjerne.svg">
        					<img src="ikoner/gul-stjerne.svg">
        					<img src="ikoner/gul-stjerne.svg">
        					<img src="ikoner/gul-stjerne.svg">
        					<img src="ikoner/gul-stjerne.svg">

    						</div>

                <h2>Mikkel</h2>

                <p>
                    Vi følte os langt
                    tryggere i boligkøbet.
                </p>

            </article>

        </div>

    </section>

    <!-- Navbar -->

    <nav class="navbar">

        <a href="vidensbase.html" class="navbar-item">
            <img src="ikoner/vidensbasen_tyk.svg" alt="Vidensbasen" class="navbar-icon">
        </a>

        <a href="profil.html" class="navbar-item">
            <img src="ikoner/profil_tyk.svg" alt="Profil" class="navbar-icon">
        </a>

        <a href="chat.html" class="navbar-item active">
            <img src="ikoner/chat_tyk.svg" alt="Chat" class="navbar-icon">
        </a>

    </nav>
    
</div>

<script src="js/galleri.js"></script>

</body>
</html>
